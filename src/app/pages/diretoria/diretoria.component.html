<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-slate-800">Diretoria</h1>
    <button (click)="openModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700">Novo Membro</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (membro of data.diretoria(); track membro.id) {
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center font-bold text-indigo-700">
            {{ membro.nome[0] }}
          </div>
          <div>
            <div class="font-bold text-slate-800">{{ membro.nome }}</div>
            <div class="text-sm text-slate-500">{{ membro.cargo }}</div>
          </div>
        </div>
        <button (click)="delete(membro.id)" class="text-rose-500 hover:text-rose-700">Excluir</button>
      </div>
    }
  </div>

  @if (showModal()) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white p-6 rounded-lg w-full max-w-sm">
        <h2 class="text-xl font-bold mb-4">Novo Membro</h2>
        <input [(ngModel)]="newMember.nome" placeholder="Nome" class="w-full p-2 border mb-2 rounded">
        <input [(ngModel)]="newMember.cargo" placeholder="Cargo" class="w-full p-2 border mb-4 rounded">
        <div class="flex justify-end gap-2">
          <button (click)="closeModal()" class="px-4 py-2 border rounded">Cancelar</button>
          <button (click)="save()" class="px-4 py-2 bg-indigo-600 text-white rounded">Salvar</button>
        </div>
      </div>
    </div>
  }
</div>
